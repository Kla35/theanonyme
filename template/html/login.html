<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thé Anonyme - Connexion</title>
  <link rel="icon" type="image/png" href="/static/img/detecteave.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="/static/css/common.css">
  <link rel="stylesheet" href="/static/css/home.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="https://kit.fontawesome.com/fff07aaee2.js" crossorigin="anonymous"></script>
</head>
<body>
  <main>
    <br/>
    <header>
      <div class="container-fluid" style="height: 100%">
        <div class="row mb-3 text-center" style="height: 100%">
          <div class="offset-1 col-10 offset-md-2 col-md-8 offset-xxl-3 col-xxl-6" style="height: 100%">
            <div style="height:100%; width: 100%; background: center / contain no-repeat url('/static/img/theanonyme.png')"></div>
          </div>    
        </div>
      </div>
    </header>
    <div class="container-fluid" style="height: 100%">
      <div class="row mb-3" style="height: 100%">
        <div class="offset-1 col-10 offset-md-2 col-md-8 offset-xxl-3 col-xxl-6" style="height: 100%">
          <div class="card">
            <h1>Connexion</h1>

            <form method="POST" action="/login">
               <div class="mb-3">
                <label for="password" class="form-label">Mot de passe</label>
                <input type="password" class="form-control" id="password" name="password" autofocus placeholder="••••••••">
              </div>
              {% if error %}
              <p class="alert alert-danger">{{ error }}</p>
              {% endif %}
              <button type="submit" class="btn btn-primary">Connexion</button>
            </div>
        </main>
        </div>    
      </div>    
  </main>
</body>
</html>
