<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thé Anonyme - Messages</title>
  <link rel="icon" type="image/png" href="/static/img/detecteave.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="/static/css/common.css">
  <link rel="stylesheet" href="/static/css/messages.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="https://kit.fontawesome.com/fff07aaee2.js" crossorigin="anonymous"></script>
</head>
<body>
  <main>
    <!-- Header -->
    <header>
      <div class="container">
        <div class="row mb-3 text-center" style="height: 100px">
          <div class="col-8 offset-md-2 col-md-8">
            <div style="height:100%; width: 100%; background: center / contain no-repeat url('/static/img/theanonyme.png')"></div>
          </div> 
          <div class="col-4 col-md-2">
            <!-- Disconnect Button -->
            <a class="btn btn-danger" href="/logout" role="button"><span>
                  <i class="fa-solid fa-right-from-bracket"></i>
              </span>Déconnexion
            </a>
            <!-- Show Twitch Chat Button -->
            <button class="btn btn-violet" id="sidebarToggle" onclick="toggleSidebar()">
              <span>
                  <i class="fa-brands fa-twitch"></i>
              </span>
              Ouvrir le tchat
            </button>
          </div>
          
        </div>
      </div>
    </header>


    <div class="d-flex" id="appWrapper">
      <!-- Main Content / Anecdote + Pagination -->
      <div class="flex-grow-1" id="mainContent">
        <!-- Pagniation -->
        <div class="container-flow" style="height: 60px;">
          <div class="row text-center"> 
            <div class="offset-1 col-10" style="display:flex; justify-content: center;">
              <nav aria-label="Page navigation example">
                <ul class="pagination">
                  <li class="page-item pointer">
                    <a class="page-link" onclick="switchToPage('1')" aria-label="To first">
                      <span aria-hidden="true">&laquo;</span>
                    </a>
                  </li>
                  <li id="pageItemLower" class="page-item disabled pointer"><a class="page-link" onclick="switchToPage('')">...</a></li>
                  <li id="pageItemActual" class="page-item active pointer"><a class="page-link" onclick="switchToPage('1')">1</a></li>
                  <li id="pageItemHigher"class="page-item disabled pointer"><a class="page-link" onclick="switchToPage('')">...</a></li>
                  <li class="page-item pointer">
                    <a class="page-link" onclick="switchToPage('999999')" aria-label="To last">
                      <span aria-hidden="true">&raquo;</span>
                    </a>
                  </li>
                </ul>
              </nav>
            </div>
          </div>
        </div>
        <!-- Anecdote List -->
        <div class="container-flow overflow-auto" style="height: calc(100% - 60px);">
          <div class="row text-center"> 
            <div class="offset-1 col-10" id="messageList"></div> 
          </div>
        </div>
      </div>
      <!-- Side Panel / Used to display Twitch Chat -->
      <div id="sidePanel" class="side-panel">
        <div class="side-panel-inner" style="overflow: hidden;">
          <iframe src="https://www.twitch.tv/embed/{{ twitch_username }}/chat?parent={{ website_domain }}"
                  height="100%"
                  width="100%">
          </iframe>
        </div>
      </div>
    </div>
  </main>

  <script>

    

    let page = 1;
    let newPage = 1; 
    let messageIdOnPage = [];
    let timer;


    /*********************
    * Polling & Polling Timer Functions
    **********************/

   // Using timeout instead of interval, because I need to control when poll will be done manually when changing page
    function schedulePoll() { /* I'm sure there is a way to simplify these 2 functions, but the brain hasn't found yet :( */
      clearTimeout(timer);
        timer = setTimeout(async () => {
            await poll();
            schedulePoll();
        }, 2000);
    }

    // And so on
    async function triggerPoll(){ /* I'm sure there is a way to simplify these 2 functions, but the brain hasn't found yet :( */
      clearTimeout(timer);
      await poll();
      schedulePoll();
    }

    // Polling 
    async function poll() {
      // Gather data from poll URL
      const res  = await fetch(`/poll?page=${newPage}`);
      const data = await res.json();
      // Verify if this is a new page
      if(newPage > data.pagesNumber) {
        newPage = data.pagesNumber;
      }
      // Loading circle and update actual page
      if (newPage != page) {
        // Remove all anecdotes, because we are switching page
        document.getElementById('messageList').innerHTML = '';
        page = newPage;
      }
      // Update pagination
      updatePagination(page, data.pagesNumber);
      // Verify which anecdotes are already on page and add new one
      messageIdOnPage = [...document.querySelectorAll("[id^='messageId_']")].map(el => el.getAttribute("value"))
      data.messages.forEach(item => {
        if (!messageIdOnPage.includes(String(item.id))){ appendRow(item); }
      });
      // Update number of anecdotes
      // document.getElementById('counter').textContent = data.total;
    }
 
    /*********************
    * Messages Functions
    **********************/

    function appendRow(item) { //This will need to be better done, I guess... 
      // Prepare div DOM element
      const divRow = document.createElement('div');
      divRow.setAttribute("id", `cardMessage_${item.id}`);
      divRow.classList.add('card');
      divRow.classList.add('card-body');
      // Prepare checkbox status
      let checkbox = "";
      if(item.seen) { divRow.classList.add("alreadySeenMessage"); checkbox="checked" }
      // Add the anecdote HTML to DOM element
      divRow.innerHTML = `
        <div class="container-flow">
          <div class="row mb-3 text-center"> 
            <div class="col-1 col-md-1" id="messageId_${item.id}" value="${item.id}">#${item.id}</div>
            <div class="col-3 col-md-2">${item.time}</div>
            <div class="col-4 col-md-7">${formatText(item.title || '—')}</div>
            <div class="col-2 col-md-1" style="display:flex; justify-content: space-evenly; align-items: center;">
              <input class="form-check-input" type="checkbox" ${checkbox} value="" id="checkMessage_${item.id}" checkboxMessageId="${item.id}" style="-webkit-transform: scale(2);" onchange="alreadyReadMessage(this)"">
            </div>
            <div class="col-2 col-md-1" style="display:flex; justify-content: space-evenly; align-items: center;">
              <a class="btn btn-primary" data-bs-toggle="collapse" href="#collapseMessage_${item.id}" role="button" aria-expanded="false">▼</a>
            </div>
          </div>
        </div>
          <div class="collapse" id="collapseMessage_${item.id}">
          <div class="card card-body">
            ${formatText(item.message || '—')}
          </div>
        </div>
      `;
      // Append the new element
      const divMessageList = document.getElementById('messageList');
      divMessageList.appendChild(divRow);
    }

    /*********************
    * Pagination Functions
    **********************/

    function switchToPage(pageNumber){
      // If we ask a new page, we display a false loading circle and we trigger the poll instantly
      if(pageNumber != page){
        newPage = pageNumber;
        document.getElementById('messageList').innerHTML = `
          <div class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        `;
        triggerPoll();
      }
    }

    function updatePagination(pageNumber, maxPageNumber) { // Thanks StackOverflow, I wouldn't have found these alone
      // It's only here to use setPageItem function
      const [lower, actual, higher] = pageNumber === 1 && maxPageNumber === 1
        ? ["...", "1", "..."]
        : getUpperLowerNumberPagination(parseInt(pageNumber), parseInt(maxPageNumber));

      setPageItem("pageItemLower", lower);
      setPageItem("pageItemActual", actual, true);
      setPageItem("pageItemHigher", higher);
    }

    function setPageItem(id, value, isActive = false) { // Create a pagination item

      const li = document.getElementById(id);
      const a = li.querySelector("a");
      const isDots = value === "...";

      a.textContent = value;
      isDots ? a.removeAttribute("onclick") : a.setAttribute("onclick", `switchToPage('${value}')`);
      li.classList.toggle("disabled", isDots);
      li.classList.toggle("active", isActive && !isDots);
    }

    /*********************
    * Misc Functions
    **********************/

    function getUpperLowerNumberPagination(pageNumber, maxPageNumber){ // Thanks StackOverflow, I wouldn't have found these alone
      // It will only predict the previous, current and next page to display in pagination
      if (pageNumber === 1) return ["...", "1", "2"];
      if (pageNumber === maxPageNumber) return [String(maxPageNumber - 1), String(maxPageNumber), "..."];
      console.log([String(pageNumber - 1), String(pageNumber), String(pageNumber + 1)])
      return [String(pageNumber - 1), String(pageNumber), String(pageNumber + 1)];
    }

    function formatText(str) { // Maybe I will cleanup this if it's not necessary
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function alreadyReadMessage(domElement){ // Let user choose what anecdote are already read, to make sure it didn't lose which one has been already read
      // Via DOM, find the anecodte id
      const id = domElement.getAttribute("checkboxMessageId");
      const domCard = document.getElementById(`cardMessage_${id}`)
      // If it's checked, lower the opacity to 0.25 and add a green color
      if(domElement.checked){
        domCard.classList.add("alreadySeenMessage")
      } else {
        domCard.classList.remove("alreadySeenMessage")
      }
      // Tell the server to remember that
      fetch(`/messages/${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ seen: domElement.checked })
      });
    }

    function toggleSidebar() { // Open/close the sidebar
      document.getElementById('sidePanel').classList.toggle('open');
    }
    
    /*********************
    * Misc Events
    **********************/

    // Change the button triangle if it's opened or closed
    document.addEventListener("show.bs.collapse", e => {
      document.querySelector(`[href='#${e.target.id}']`).textContent = "▲";
    });
    document.addEventListener("hide.bs.collapse", e => {
      document.querySelector(`[href='#${e.target.id}']`).textContent = "▼";
    });
    
    /*********************
    * General
    **********************/
   //Launch the timeout polling
    triggerPoll();

  </script>
</body>
</html>
